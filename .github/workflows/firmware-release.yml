name: Build and Release Firmware

on:
  push:
    branches:
      - main
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-release.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio
        
    - name: Build Firmware
      working-directory: ./firmware
      run: |
        pio run -e esp32s3
        
    - name: Prepare Artifacts
      run: |
        mkdir -p release_assets
        cp firmware/.pio/build/esp32s3/bootloader.bin release_assets/
        cp firmware/.pio/build/esp32s3/partitions.bin release_assets/
        cp firmware/.pio/build/esp32s3/firmware.bin release_assets/
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: firmware-${{ github.run_number }}
        name: Firmware Build #${{ github.run_number }}
        files: release_assets/*.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
